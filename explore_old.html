    <style>

        ARTICLE ITEMS
        ───────────────────────────────────────── */
        .article-item {
            padding: 0.75rem 0.6rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            transition: background 0.15s, padding-left 0.2s;

        }

        }

        }

            background: #111;

        DRAW SECTION
        ───────────────────────────────────────── */
        .draw-section {
            max-width: 820px;
            margin: 0 auto 0;
            width: 100%;
        }


        .draw-section canvas.drawing-canvas {
            display: block;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            aspect-ratio: 14 / 7;
            cursor: crosshair;
            border: 1px solid rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
        }

        body.dark-mode .draw-section canvas.drawing-canvas {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .canvas-hint {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            font-family: 'Inter', sans-serif;
            font-size: 0.6rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.12;
            transition: opacity 0.3s;
        }

        .draw-section.drawing .canvas-hint {
            opacity: 0;
        }

        .draw-bottom-row {
            margin-top: 0.4rem;
        }

        @keyframes psychedelic-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .psychedelic-line {
            background: linear-gradient(90deg,
                    #ff0080, #ff4500, #ffd700, #00ff88,
                    #00bfff, #8a2be2, #ff1493, #ff0080);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: psychedelic-shift 2.2s ease infinite;
        }

        .drawing-instructions {

        .tool-tile {

        /* ── SPOTIFY PANEL ─────────────────────────────── */

<body>
    <script>
        if (localStorage.getItem('darkMode') === 'true') {

    <section class="standard-page">

        <div class="draw-section">
            <div class="draw-canvas-wrap">
                <div class="draw-canvas-title">Draw a&nbsp;<span class="psychedelic-line">line</span></div>
                <div class="drawing-canvas-container">
                    <canvas class="drawing-canvas" id="drawingCanvas" width="1600" height="700"></canvas>
                </div>
            </div>

            <div class="draw-bottom-row">
                <div class="draw-instructions-only">
                    smooth curves → narrative &nbsp;·&nbsp; sharp angles → analytical
                    tight cluster → specific  &nbsp;·&nbsp; wide spread → general
                </div>
            </div>

            <div class="article-recommendation" id="articleRec">
                <span id="recText"></span>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="toolbar-section">
            <div class="toolbar-bar" id="toolbarBar">
                <!-- tiles injected by JS -->
            </div>
        </div>

    </section>

    <div class="shortcuts-hint"></div>


    <script>
        // Dark mode
        window.addEventListener('load', () => {
            buildToolbar();
        });

        // ── Drawing Canvas ────────────────────────────
        const drawCanvas = document.getElementById('drawingCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        let isDrawing = false, lastPoint = null, points = [], drawingProgress = 0;

        function getHSLColor(p) { return `hsl(${(p * 360) % 360}, 80%, 55%)`; }

        function drawGrid() {
            const w = drawCanvas.width, h = drawCanvas.height;
            const isDark = document.body.classList.contains('dark-mode');
            drawCtx.fillStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.045)';
            for (let x = 80; x < w; x += 80) {
                for (let y = 80; y < h; y += 80) {
                    drawCtx.beginPath();
                    drawCtx.arc(x, y, 1.5, 0, Math.PI * 2);
                    drawCtx.fill();
                }
            }
        }
        drawGrid();


        function getCanvasPoint(clientX, clientY) {
            const rect = drawCanvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (drawCanvas.width / rect.width),
                y: (clientY - rect.top) * (drawCanvas.height / rect.height)
            };
        }

        function analyzeGeometry(pts) {
            const baseline = { sharpness: 0, spread: 0 };
            if (pts.length < 5) return baseline;

            // Path length, bounding box, segment lengths — single pass.
            let totalLen = 0;
            const segs = [];
            let minX = pts[0].x, maxX = pts[0].x, minY = pts[0].y, maxY = pts[0].y;
            for (let i = 1; i < pts.length; i++) {
                const d = Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
                segs.push(d);
                totalLen += d;
                if (pts[i].x < minX) minX = pts[i].x;
                else if (pts[i].x > maxX) maxX = pts[i].x;
                if (pts[i].y < minY) minY = pts[i].y;
                else if (pts[i].y > maxY) maxY = pts[i].y;
            }
            if (totalLen < 40) return baseline;

            // Spread (generality). Fraction of the canvas the drawing reaches along its wider extent. A horizontal line spanning the width
            const w = maxX - minX, h = maxY - minY;
            const spread = Math.min(1, Math.max(w / drawCanvas.width, h / drawCanvas.height));

            // Arc-length resample to N points. N adapts so each step is
            // ~5 pixels — avoids noise
            const N = Math.min(200, Math.max(30, Math.floor(totalLen / 5)));
            const step = totalLen / (N - 1);
            const rs = [pts[0]];
            let acc = 0, j = 1;
            for (let i = 1; i < N - 1; i++) {
                const target = i * step;
                while (j < pts.length && acc + segs[j-1] < target) {
                    acc += segs[j-1];
                    j++;
                }
                if (j >= pts.length) break;
                const t = (target - acc) / segs[j-1];
                rs.push({
                    x: pts[j-1].x + t * (pts[j].x - pts[j-1].x),
                    y: pts[j-1].y + t * (pts[j].y - pts[j-1].y)
                });
            }
            rs.push(pts[pts.length - 1]);

            // Median-of-3 smoothing. Single-pixel jitter is absorbed (the
            // wobble is never the middle value of its 3-point neighbourhood);
            // a real corner survives (its apex stays the median of the three).
            const sm = rs.map((p, i) => {
                if (i === 0 || i === rs.length - 1) return p;
                const a = rs[i-1], b = rs[i], c = rs[i+1];
                const xs = [a.x, b.x, c.x].sort((u, v) => u - v);
                const ys = [a.y, b.y, c.y].sort((u, v) => u - v);
                return { x: xs[1], y: ys[1] };
            });

            // Sharpness - measuring turn concentration
            //
            // At each resampled point, measure the windowed turning angle.
            // Then weight each angle by angle^P with P slightly above 1 (by trial and error)
            //
            //     sharpness = (top-Q weighted fraction  −  Q) / (1 − Q)
            //
            // Where Q is the fraction of windows we inspect (top 10%).
            // 
            const W = 4;
            const P = 1.3;
            const angles = [];
            for (let i = W; i < sm.length - W; i++) {
                const pPrev = sm[i-W], pCurr = sm[i], pNext = sm[i+W];
                const ax = pCurr.x - pPrev.x, ay = pCurr.y - pPrev.y;
                const bx = pNext.x - pCurr.x, by = pNext.y - pCurr.y;
                const mag = Math.hypot(ax, ay) * Math.hypot(bx, by);
                if (mag < 1e-10) continue;
                const c = Math.max(-1, Math.min(1, (ax*bx + ay*by) / mag));
                angles.push(Math.acos(c));
            }
            if (angles.length < 5) return { sharpness: 0, spread };

            const weighted = angles.map(a => Math.pow(a, P));
            const total = weighted.reduce((s, v) => s + v, 0);
            if (total < 1e-10) return { sharpness: 0, spread };

            const sorted = [...weighted].sort((a, b) => b - a);
            const K = Math.max(1, Math.round(weighted.length * 0.1));
            const topSum = sorted.slice(0, K).reduce((s, v) => s + v, 0);
            const Q = K / weighted.length;
            const concentration = topSum / total;
            const sharpness = Math.max(0, Math.min(1, (concentration - Q) / (1 - Q)));

            return { sharpness, spread };
        }
        
        function analyzeDrawing() {
            if (typeof articles === 'undefined' || !articles.length) return;
            const geom = analyzeGeometry(points);

            // Minimize Euclidean distance utilizing a functional reduce approach
            const best = articles.reduce((prev, curr) => {
                const distPrev = Math.hypot(prev.sharpness - geom.sharpness, (prev.spread || 0) - geom.spread);
                const distCurr = Math.hypot(curr.sharpness - geom.sharpness, (curr.spread || 0) - geom.spread);
                return distCurr < distPrev ? curr : prev;
            });

            // Map continuous outputs to boolean stylistic logic for text generation
            const isSharp = geom.sharpness > 0.5;
            const isSpread = geom.spread > 0.5;

            const sharpType = isSharp ? "sharp curves" : "smooth curves";
            const sharpStyle = isSharp ? "analytical, conceptual thinking" : "narrative, flowing ideas";
            const spreadType = isSpread ? "wide spread" : "tight cluster";
            const spreadStyle = isSpread ? "broad generality" : "focused specificity";

            document.getElementById('recText').innerHTML =
                `Your ${sharpType} suggest a preference for ${spreadStyle}, ${sharpStyle}. <strong>Recommended for you:</strong><br><a href="${articlePath(best)}" style="color:inherit;text-decoration:underline;">"${best.title}"</a> — ${best.recommendationDesc || ''}`;
            document.getElementById('articleRec').classList.add('visible');
        }

        drawCanvas.addEventListener('mousedown', e => {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawGrid();
            document.getElementById('articleRec').classList.remove('visible');
            drawCanvas.closest('.draw-section').classList.add('drawing');
            isDrawing = true; drawingProgress = 0;
            lastPoint = getCanvasPoint(e.clientX, e.clientY);
            points = [lastPoint];
        });
        drawCanvas.addEventListener('mousemove', e => {
            if (!isDrawing) return;
            const p = getCanvasPoint(e.clientX, e.clientY);
            drawingProgress += 0.02;
            drawCtx.strokeStyle = getHSLColor(drawingProgress);
            drawCtx.lineWidth = 3; drawCtx.lineCap = 'round';
            drawCtx.beginPath();
            drawCtx.moveTo(lastPoint.x, lastPoint.y);
            drawCtx.lineTo(p.x, p.y);
            drawCtx.stroke();
            points.push(p); lastPoint = p;
        });
        drawCanvas.addEventListener('mouseup', () => {
            if (isDrawing && points.length > 5) analyzeDrawing();
            isDrawing = false;
            drawCanvas.closest('.draw-section').classList.remove('drawing');
        });
        drawCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawGrid();
            document.getElementById('articleRec').classList.remove('visible');
            drawCanvas.closest('.draw-section').classList.add('drawing');
            isDrawing = true; drawingProgress = 0;
            lastPoint = getCanvasPoint(e.touches[0].clientX, e.touches[0].clientY);
            points = [lastPoint];
        });
        drawCanvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!isDrawing) return;
            const p = getCanvasPoint(e.touches[0].clientX, e.touches[0].clientY);
            drawingProgress += 0.02;
            drawCtx.strokeStyle = getHSLColor(drawingProgress);
            drawCtx.lineWidth = 3; drawCtx.lineCap = 'round';
            drawCtx.beginPath();
            drawCtx.moveTo(lastPoint.x, lastPoint.y);
            drawCtx.lineTo(p.x, p.y);
            drawCtx.stroke();
            points.push(p); lastPoint = p;
        });
        drawCanvas.addEventListener('touchend', () => {
            if (isDrawing && points.length > 5) analyzeDrawing();
            isDrawing = false;
            drawCanvas.closest('.draw-section').classList.remove('drawing');
        });

        // ── Toolbar ───────────────────────────────────
        function buildToolbar() {
            const bar = document.getElementById('toolbarBar');
            if (!bar) return;

            const articlesHtml = () => {
                if (typeof articles === 'undefined' || !articles.length)
                    return '<p style="opacity:0.4;font-size:0.85rem;">Nessun articolo caricato.</p>';
                return articles.map(a => `
                <a href="${articlePath(a)}" class="article-item">
                    <h4>${a.title}
                        <span style="font-weight:400;opacity:0.45;font-size:0.72rem;">
                            ${a.publishDate || ''} · ${a.readTime || ''}
                        </span>
                    </h4>
                    <p>${a.description || ''}</p>
                </a>`).join('');
            };

            const tiles = [
                {
                    num: '01', name: 'Essays',
                    scrollable: true,
                    content: () => articlesHtml()
                },
                {
                    num: '02', name: 'Playlist',
                    content: () => `<div style="max-width:360px;"><iframe style="border-radius:0;width:100%;height:152px;display:block;border:none;"
                    src="https://open.spotify.com/embed/playlist/1UQ7pG01imfZRid6JVeEhS?utm_source=generator"
                    frameBorder="0" allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe></div>`
                },
                {
                    num: '03', name: 'Algorithm',
                    content: () => `
                    <p style="font-size:0.95rem; text-align:center;">
                    \\[ \\underset{a \\in \\{\\text{articles}\\}}{\\operatorname{argmin}} \\sqrt{(S_d - S_a)^2 + (G_d - G_a)^2} \\]
                    </p>
                    <p style="font-size:0.8rem;opacity:0.6;margin-top:0.5rem;">
                    Where S is Sharpness and G is Spread (Generality). Our recommendation logic matches drawn geometries to narrative coordinates in real-time.
                    </p>`
                },

                {
                    num: '04', name: 'Citation',
                    content: () => `<p id="randomCitation"
                    style="font-style:italic;font-size:1rem;line-height:1.6;opacity:0.85;">
                    "Language is a virus from outer space." — William S. Burroughs
                    </p>`
                },
                {
                    num: '05', name: 'Methodology',
                    content: () => `<p style="font-size:0.88rem;line-height:1.6;opacity:0.7;">
                    Our research combines archival depth with computational methods.
                    Every claim is traceable. Every image is contextualized.
                    </p>`
                },
                {
                    num: '06', name: 'Our Desk',
                    content: () => `
                    <div class="map-panel-wrap">
                        <iframe src="map/map.html?embed" loading="lazy" tabindex="-1"></iframe>
                        <div class="map-panel-overlay" onclick="window.location.href='map/map.html'">
                            <span>Open our desk →</span>
                        </div>
                    </div>`
                },
            ];

            bar.innerHTML = tiles.map((t, i) => `
            <div class="tool-tile" id="tile-${i}"
                 onmouseenter="clearTimeout(window._tileTimer)"
                 onmouseleave="window._tileTimer = setTimeout(() => {
                     document.querySelectorAll('.tool-tile.pinned').forEach(t=>t.classList.remove('pinned'));
                 }, 250)">
                <div class="tool-panel ${t.scrollable ? 'scrollable' : ''}"
                     onmouseenter="clearTimeout(window._tileTimer)"
                     onmouseleave="window._tileTimer = setTimeout(() => {
                         document.querySelectorAll('.tool-tile.pinned').forEach(t=>t.classList.remove('pinned'));
                     }, 250)">
                    <div class="tool-panel-inner" data-label="${t.name}">${t.content()}</div>
                </div>
                <div class="tool-tile-label">
                    <span class="tool-tile-num">${t.num}</span>
                    <span class="tool-tile-name">${t.name}</span>
                </div>
            </div>`).join('');

            const cit = document.getElementById('randomCitation');
            if (cit && typeof getRandomCitation === 'function')
                cit.textContent = getRandomCitation();

            if (window.MathJax) MathJax.typesetPromise();
        }

        function getRandomCitation() {
            let all = [];
            if (typeof articles !== 'undefined') {
                articles.forEach(a => { if (a.citations) all = all.concat(a.citations); });
            }
            if (!all.length) return '"Language is a virus from outer space." — William S. Burroughs';
            const [author, quote] = all[Math.floor(Math.random() * all.length)].split('/');
            return `"${quote}" — ${author}`;
        }

        initProgressBar();
        if (isDesktop) {
            initKeyboardShortcuts({
                extraKeys: {
                    'a': openNextArticle,
                    'A': openNextArticle,
                    'Escape': returnToHome,
                    'h': returnToHome,
                    'H': returnToHome,
                }
            });
        }
    </script>
</body>
