    <style>
        /* ─────────────────────────────────────────
        ARTICLE ITEMS
        ───────────────────────────────────────── */
        .article-item {
            padding: 0.75rem 0.6rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            transition: background 0.15s, padding-left 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .article-item:last-child { border-bottom: none; }

        body.dark-mode .article-item { border-color: rgba(255, 255, 255, 0.08); }

        .article-item:hover {
            background: var(--gray, #f7f7f7);
            padding-left: 1rem;
        }

        body.dark-mode .article-item:hover { background: #111; }

        .article-item h4 {
            font-size: 0.88rem;
            margin-bottom: 0.15rem;
            font-weight: 600;
            font-family: 'Crimson Pro', serif;
            letter-spacing: 0.01em;
        }

        .article-item p {
            font-size: 0.82rem;
            line-height: 1.4;
            opacity: 0.55;
            font-family: 'Crimson Pro', serif;
        }

        /* ─────────────────────────────────────────
        DRAW SECTION
        ───────────────────────────────────────── */
        .draw-section {
            max-width: 820px;
            margin: 0 auto 0;
            width: 100%;
        }

        .draw-section canvas.drawing-canvas {
            display: block;
            width: 100% !important;
            max-width: 100% !important;
            height: auto !important;
            aspect-ratio: 14 / 7;
            cursor: crosshair;
            border: 1px solid rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
        }

        body.dark-mode .draw-section canvas.drawing-canvas {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .draw-bottom-row { margin-top: 0.4rem; }

        @keyframes psychedelic-shift {
            0%   { background-position:   0% 50%; }
            50%  { background-position: 100% 50%; }
            100% { background-position:   0% 50%; }
        }

        .psychedelic-line {
            background: linear-gradient(90deg,
                    #ff0080, #ff4500, #ffd700, #00ff88,
                    #00bfff, #8a2be2, #ff1493, #ff0080);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: psychedelic-shift 2.2s ease infinite;
        }

        .article-recommendation {
            margin-top: 1.8rem;
            padding: 1.5rem;
            border: 1px solid var(--dynamic-color);
            background: var(--gray);
            font-family: var(--grotesk);
            font-size: 0.9rem;
            line-height: 1.6;
            opacity: 0;
            transition: opacity 0.3s var(--ease), border-color 0.6s var(--ease);
            text-align: center;
        }

        body.dark-mode .article-recommendation { background: #0a0a0a; }
        .article-recommendation.visible { opacity: 1; }

        /* ── Draw a line ── */
        .draw-canvas-wrap {
            position: relative;
            padding-top: 1.8rem;
        }

        /* The title row contains the color picker on the left and the
           "Draw a line" title on the right. Centered above the canvas. */
        .draw-title-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.4rem;
            position: absolute;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            white-space: nowrap;
        }

        .draw-canvas-title {
            background: #fff;
            font-family: 'Fraunces', serif;
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.025em;
            white-space: nowrap;
            padding: 0 0.6rem;
        }

        body.dark-mode .draw-canvas-title { background: var(--bg, #000000); }

        /* Picker stack: chips on top, wheel below */
        .color-picker-inline {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
        }

        .draw-instructions-only {
            font-size: 0.58rem;
            opacity: 0.22;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Inter', sans-serif;
            margin-top: 0.5rem;
            text-align: right;
        }

        body.dark-mode .draw-instructions-only { opacity: 0.45; }

        /* ─────────────────────────────────────────
        COLOR WHEEL PICKER
        ───────────────────────────────────────── */
        .color-wheel-wrap {
            position: relative;
            width: 90px;
            height: 90px;
            cursor: pointer;
            user-select: none;
        }

        .color-wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: block;
        }

        body.dark-mode .color-wheel { box-shadow: 0 0 0 1px rgba(255,255,255,0.05); }

        /* center "hub" — purely cosmetic, lets the ring read as a ring */
        .color-wheel-hub {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 50%;
            background: var(--white, #fff);
            border-radius: 50%;
            pointer-events: none;
        }

        body.dark-mode .color-wheel-hub { background: #000; }

        .color-wheel-hub-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Inter', sans-serif;
            font-size: 0.40rem;
            text-transform: uppercase;
            opacity: 0.5;
            pointer-events: none;
            white-space: nowrap;
            text-align: center;
            line-height: 1.25;
        }

        .color-marker {
            position: absolute;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: transform 0.15s;
        }

        .color-marker:hover { transform: translate(-50%, -50%) scale(1.2); }

        body.dark-mode .color-marker {
            border-color: #000;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.5);
        }

        .color-chips {
            display: flex;
            gap: 0.35rem;
            min-height: 12px;
            align-items: center;
            justify-content: center;
        }

        .color-chip {
            width: 11px;
            height: 11px;
            border-radius: 50%;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.15);
            transition: transform 0.15s, opacity 0.15s;
        }

        .color-chip:hover { transform: scale(1.3); }

        /* Mobile fallback: revert to a stacked picker below the canvas.
           The desktop title-row picker is hidden; the legacy section below shows. */
        .color-picker-section {
            display: none;
        }

        @media (max-width: 767px) {
            .color-picker-inline { display: none; }
            .draw-title-row { gap: 0; }

            .color-picker-section {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 0.6rem;
                margin: 1.5rem 0 1rem;
            }
            .color-picker-section .color-wheel-wrap {
                width: 110px;
                height: 110px;
            }
            .color-picker-section .color-wheel-hub-text {
                font-size: 0.46rem;
                letter-spacing: 0.18em;
                line-height: 1.2;
            }
            .color-picker-section .color-marker {
                width: 14px;
                height: 14px;
            }
            .color-picker-section .color-chip {
                width: 14px;
                height: 14px;
            }

            .article-recommendation {
                margin-top: 1.4rem;
                padding: 0.8rem;
                font-size: 0.80rem;
            }
            .draw-canvas-wrap { padding-top: 1rem; max-width: 400px; }
            .draw-canvas-title {
                position: absolute;
                top: 0;
                left: 50%;
                transform: translate(-50%, -30%);
                font-size: 2.3rem;
            }
            .draw-title-row {
                /* on mobile, the row collapses to just the title */
                gap: 0;
            }
            .draw-section canvas.drawing-canvas { aspect-ratio: 2.5 / 3; }
            .draw-instructions-only {
                font-size: 0.47rem;
                letter-spacing: 0.1em;
            }
        }

        /* ─────────────────────────────────────────
        TOOLBAR
        ───────────────────────────────────────── */
        .toolbar-section {
            max-width: 820px;
            margin: 2.5rem -5% 4rem;
            width: 120%;
        }

        .toolbar-bar {
            display: flex;
            gap: 0;
            border-top: 1px solid currentColor;
            border-bottom: 1px solid currentColor;
            overflow: visible;
            position: relative;
        }

        .tool-tile {
            flex: 1;
            position: relative;
            border-right: 1px solid rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
            cursor: pointer;
            overflow: visible;
            transition: background 0.15s;
        }

        body.dark-mode .tool-tile { border-right-color: rgba(255, 255, 255, 0.08); }
        .tool-tile:last-child { border-right: none; }
        .tool-tile:hover { background: rgba(0, 0, 0, 0.025); }
        body.dark-mode .tool-tile:hover { background: rgba(255, 255, 255, 0.025); }
        .tool-tile.pinned { background: rgba(0, 0, 0, 0.03); }
        body.dark-mode .tool-tile.pinned { background: rgba(255, 255, 255, 0.03); }

        .tool-tile::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 0;
            right: 0;
            height: 1.5px;
            background: currentColor;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tool-tile:hover::before,
        .tool-tile.pinned::before { transform: scaleX(1); }

        .tool-tile-label {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 0.7rem 0.75rem 0.65rem;
            gap: 0.2rem;
            transition: opacity 0.15s;
            user-select: none;
        }

        .tool-tile:hover .tool-tile-label,
        .tool-tile.pinned .tool-tile-label { opacity: 0.5; }

        .tool-tile-num {
            font-family: 'Inter', sans-serif;
            font-size: 0.48rem;
            opacity: 0.28;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .tool-tile-name {
            font-family: 'Inter', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .tool-panel {
            position: absolute;
            bottom: 100%;
            left: -1px;
            width: 360px;
            background: #fff;
            border: 1px solid currentColor;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                        opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.38s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateY(8px) skewX(-1.5deg);
            transform-origin: bottom left;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
        }

        body.dark-mode .tool-panel { background: #0c0c0c; }

        .tool-tile:hover .tool-panel,
        .tool-tile.pinned .tool-panel {
            max-height: 560px;
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) skewX(0deg);
        }

        .tool-panel-inner {
            padding: 1.1rem 1rem 1.4rem;
            font-family: 'Crimson Pro', serif;
            font-size: 0.92rem;
            line-height: 1.55;
        }

        .tool-panel-inner::before {
            content: attr(data-label);
            display: block;
            font-family: 'Inter', sans-serif;
            font-size: 0.52rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            opacity: 0.3;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.dark-mode .tool-panel-inner::before {
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }

        .tool-panel.scrollable .tool-panel-inner {
            max-height: 340px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.15) transparent;
        }

        .tool-panel.scrollable .tool-panel-inner::-webkit-scrollbar { width: 2px; }
        .tool-panel.scrollable .tool-panel-inner::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.15);
        }

        /* ── SPOTIFY PANEL ── */
        #tile-1 .tool-panel-inner { padding: 0; }
        #tile-1 .tool-panel-inner::before { display: none; }

        /* ── MAP PANEL ── */
        #tile-5 .tool-panel { padding: 0; cursor: pointer; }
        #tile-5 .tool-panel-inner { padding: 0; position: relative; }
        #tile-5 .tool-panel-inner::before { display: none; }

        .map-panel-wrap { position: relative; width: 100%; }
        .map-panel-wrap iframe {
            display: block;
            width: 100%;
            height: 200px;
            border: none;
            pointer-events: none;
            scale: 2;
            opacity: 0.5;
        }
        .map-panel-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 0.6rem 0.8rem;
        }
        .map-panel-overlay span {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            background: rgba(10,14,39,0.6);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 767px) {
            .toolbar-section { display: none; }
        }
    </style>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // COLOR WHEEL — hue picker, up to 3 selections
        // Multiple wheels can coexist (desktop title-row, mobile below).
        // They share state; only the visible one is interactive.
        // ═══════════════════════════════════════════════════════════════
        const wheelWraps = Array.from(document.querySelectorAll('.js-color-wheel-wrap'));
        const chipContainers = Array.from(document.querySelectorAll('.js-color-chips'));
        const MAX_COLORS = 3;
        const SELECT_TOLERANCE = 18; // degrees — clicking near an existing marker removes it

        // selectedHues: array of numbers in [0, 360)
        let selectedHues = [];

        function drawColorWheel(canvas) {
            const ctx = canvas.getContext('2d');
            const size = canvas.width;
            const cx = size / 2, cy = size / 2;
            const outerR = size / 2 - 2;
            const innerR = outerR * 0.55;

            ctx.clearRect(0, 0, size, size);

            const STEP = 0.5; // degrees per slice
            for (let deg = 0; deg < 360; deg += STEP) {
                const start = ((deg - 90) * Math.PI) / 180;
                const end = ((deg + STEP - 90) * Math.PI) / 180;
                ctx.beginPath();
                ctx.moveTo(cx + Math.cos(start) * innerR, cy + Math.sin(start) * innerR);
                ctx.arc(cx, cy, outerR, start, end);
                ctx.lineTo(cx + Math.cos(end) * innerR, cy + Math.sin(end) * innerR);
                ctx.arc(cx, cy, innerR, end, start, true);
                ctx.closePath();
                ctx.fillStyle = `hsl(${deg}, 80%, 55%)`;
                ctx.fill();
            }
        }

        wheelWraps.forEach(wrap => {
            const canvas = wrap.querySelector('.js-color-wheel');
            if (canvas) drawColorWheel(canvas);
        });

        // Map a click position on a given wrap to a hue (or null if outside the ring)
        function pointToHue(wrap, clientX, clientY) {
            const rect = wrap.getBoundingClientRect();
            const cx = rect.width / 2;
            const cy = rect.height / 2;
            const dx = clientX - rect.left - cx;
            const dy = clientY - rect.top - cy;
            const dist = Math.hypot(dx, dy);

            const outerR = rect.width / 2;
            const innerR = outerR * 0.55;
            if (dist < innerR * 0.9 || dist > outerR * 1.05) return null;

            let angle = Math.atan2(dy, dx) * 180 / Math.PI;
            angle += 90;
            if (angle < 0) angle += 360;
            return angle;
        }

        function hueDistanceCircular(a, b) {
            const d = Math.abs(a - b) % 360;
            return Math.min(d, 360 - d);
        }

        function renderMarkers() {
            wheelWraps.forEach(wrap => {
                wrap.querySelectorAll('.color-marker').forEach(m => m.remove());

                const rect = wrap.getBoundingClientRect();
                if (rect.width === 0) return; // hidden by display:none — skip
                const size = rect.width;
                const cx = size / 2, cy = size / 2;
                const outerR = size / 2;
                const innerR = outerR * 0.55;
                const r = (innerR + outerR) / 2;

                selectedHues.forEach((hue, idx) => {
                    const angle = (hue - 90) * Math.PI / 180;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;

                    const marker = document.createElement('div');
                    marker.className = 'color-marker';
                    marker.style.left = x + 'px';
                    marker.style.top = y + 'px';
                    marker.style.background = `hsl(${hue}, 80%, 55%)`;
                    marker.addEventListener('click', (e) => {
                        e.stopPropagation();
                        selectedHues.splice(idx, 1);
                        renderMarkers();
                        renderChips();
                    });
                    wrap.appendChild(marker);
                });
            });
        }

        function renderChips() {
            chipContainers.forEach(container => {
                container.innerHTML = '';
                selectedHues.forEach((hue, idx) => {
                    const chip = document.createElement('span');
                    chip.className = 'color-chip';
                    chip.style.background = `hsl(${hue}, 80%, 55%)`;
                    chip.title = 'Click to remove';
                    chip.addEventListener('click', () => {
                        selectedHues.splice(idx, 1);
                        renderMarkers();
                        renderChips();
                    });
                    container.appendChild(chip);
                });
            });
        }

        wheelWraps.forEach(wrap => {
            wrap.addEventListener('click', (e) => {
                const hue = pointToHue(wrap, e.clientX, e.clientY);
                if (hue === null) return;

                const nearIdx = selectedHues.findIndex(h => hueDistanceCircular(h, hue) < SELECT_TOLERANCE);
                if (nearIdx !== -1) {
                    selectedHues.splice(nearIdx, 1);
                } else if (selectedHues.length < MAX_COLORS) {
                    selectedHues.push(hue);
                } else {
                    let closest = 0, minD = Infinity;
                    selectedHues.forEach((h, i) => {
                        const d = hueDistanceCircular(h, hue);
                        if (d < minD) { minD = d; closest = i; }
                    });
                    selectedHues[closest] = hue;
                }
                renderMarkers();
                renderChips();
            });
        });

        renderChips();

        // ═══════════════════════════════════════════════════════════════
        // DRAWING CANVAS
        // ═══════════════════════════════════════════════════════════════
        const drawCanvas = document.getElementById('drawingCanvas');
        const drawCtx = drawCanvas.getContext('2d');
        let isDrawing = false, lastPoint = null, points = [], drawingProgress = 0;

        // Get the stroke color for a given progress value [0, ∞).
        // - 0 colors picked: full rainbow (legacy behavior).
        // - 1 color: that color, solid.
        // - 2+ colors: cycle around a closed loop through the picked hues.
        //   Each segment is mostly the pure color of one endpoint, with a
        //   short smoothstep transition in the middle. Visually: long
        //   plateaus separated by quick gradient flashes.
        function getStrokeColor(p) {
            if (selectedHues.length === 0) {
                return `hsl(${(p * 360) % 360}, 80%, 55%)`;
            }
            if (selectedHues.length === 1) {
                return `hsl(${selectedHues[0]}, 80%, 55%)`;
            }
            const n = selectedHues.length;
            // cycle speed — higher = faster alternation between colors
            const cyc = ((p * 0.9) % 1 + 1) % 1; // [0, 1)
            const seg = cyc * n;
            const i = Math.floor(seg) % n;
            const tRaw = seg - Math.floor(seg);

            // Plateau + smooth transition.
            // TRANSITION_WIDTH is the fraction of each segment that gradients;
            // the rest splits equally between the two endpoint plateaus.
            // Wider = the A→B blend is more visible as an actual gradient.
            const TRANSITION_WIDTH = 0.45;
            const half = TRANSITION_WIDTH / 2;
            let t;
            if (tRaw < 0.5 - half)      t = 0;
            else if (tRaw > 0.5 + half) t = 1;
            else {
                const u = (tRaw - (0.5 - half)) / TRANSITION_WIDTH; // [0,1]
                t = u * u * (3 - 2 * u); // smoothstep
            }

            const a = selectedHues[i];
            const b = selectedHues[(i + 1) % n];
            // shortest-arc interpolation
            let diff = b - a;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            const hue = (a + diff * t + 360) % 360;
            return `hsl(${hue}, 80%, 55%)`;
        }

        function drawGrid() {
            const w = drawCanvas.width, h = drawCanvas.height;
            const isDark = document.body.classList.contains('dark-mode');
            drawCtx.fillStyle = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.045)';
            for (let x = 80; x < w; x += 80) {
                for (let y = 80; y < h; y += 80) {
                    drawCtx.beginPath();
                    drawCtx.arc(x, y, 1.5, 0, Math.PI * 2);
                    drawCtx.fill();
                }
            }
        }
        drawGrid();

        function getCanvasPoint(clientX, clientY) {
            const rect = drawCanvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (drawCanvas.width / rect.width),
                y: (clientY - rect.top) * (drawCanvas.height / rect.height)
            };
        }

        // ── Geometry analysis: 2-inch window mean-max ─────────────────
        // Walks along the line in windows of physical 2 inches. For each
        // window, takes the max turn angle inside it. Averages those
        // maxes across all main windows + overlapping in-between windows.
        // Returns a normalized [0, 1] score (raw / π).
        //
        // 2 inches is computed from the canvas's current rendered size:
        // 96 CSS px per inch (CSS spec) scaled to canvas-internal units.
        function analyzeSharpness(pts) {
            if (pts.length < 5) return 0;

            // arc-length resample + median-of-3 smoothing (shared preprocessing)
            let totalLen = 0;
            const segs = [];
            for (let i = 1; i < pts.length; i++) {
                const d = Math.hypot(pts[i].x - pts[i-1].x, pts[i].y - pts[i-1].y);
                segs.push(d);
                totalLen += d;
            }
            if (totalLen < 40) return 0;

            const N = Math.min(200, Math.max(30, Math.floor(totalLen / 5)));
            const step = totalLen / (N - 1);
            const rs = [pts[0]];
            let acc = 0, j = 1;
            for (let i = 1; i < N - 1; i++) {
                const target = i * step;
                while (j < pts.length && acc + segs[j-1] < target) {
                    acc += segs[j-1];
                    j++;
                }
                if (j >= pts.length) break;
                const t = (target - acc) / segs[j-1];
                rs.push({
                    x: pts[j-1].x + t * (pts[j].x - pts[j-1].x),
                    y: pts[j-1].y + t * (pts[j].y - pts[j-1].y)
                });
            }
            rs.push(pts[pts.length - 1]);

            const sm = rs.map((p, i) => {
                if (i === 0 || i === rs.length - 1) return p;
                const a = rs[i-1], b = rs[i], c = rs[i+1];
                const xs = [a.x, b.x, c.x].sort((u, v) => u - v);
                const ys = [a.y, b.y, c.y].sort((u, v) => u - v);
                return { x: xs[1], y: ys[1] };
            });

            // turn angles at each interior point (W=4 half-window for direction)
            const W = 4;
            const angles = [];
            for (let i = W; i < sm.length - W; i++) {
                const ax = sm[i].x - sm[i-W].x, ay = sm[i].y - sm[i-W].y;
                const bx = sm[i+W].x - sm[i].x, by = sm[i+W].y - sm[i].y;
                const mag = Math.hypot(ax, ay) * Math.hypot(bx, by);
                if (mag < 1e-10) { angles.push(0); continue; }
                const cos = Math.max(-1, Math.min(1, (ax*bx + ay*by) / mag));
                angles.push(Math.acos(cos));
            }
            if (!angles.length) return 0;

            // arc length of the smoothed line, and cumulative arc per point
            const cum = [0];
            for (let i = 1; i < sm.length; i++) {
                cum.push(cum[i-1] + Math.hypot(sm[i].x - sm[i-1].x, sm[i].y - sm[i-1].y));
            }
            const L = cum[cum.length - 1];

            // 2 inches in canvas-internal units, derived from current canvas DOM size
            const rect = drawCanvas.getBoundingClientRect();
            const internalPerCss = rect.width === 0 ? 1 : drawCanvas.width / rect.width;
            const windowLen = 2 * 96 * internalPerCss; // 96 CSS px / inch

            // angles[k] corresponds to point index k+W in `sm`
            function maxAngleInArc(start, end) {
                let maxA = 0;
                for (let k = 0; k < angles.length; k++) {
                    const arc = cum[k + W];
                    if (arc >= start && arc <= end && angles[k] > maxA) {
                        maxA = angles[k];
                    }
                }
                return maxA;
            }

            // nMain = ceil(L / 2in). Distribute that many contiguous windows
            // across [0, L]. Add overlapping in-between windows centered on
            // each interior boundary.
            const nMain = Math.max(1, Math.ceil(L / windowLen));
            const mainLen = L / nMain;
            const windows = [];
            for (let i = 0; i < nMain; i++) {
                windows.push([i * mainLen, (i + 1) * mainLen]);
            }
            for (let i = 1; i < nMain; i++) {
                const c = i * mainLen;
                const half = mainLen / 2;
                windows.push([Math.max(0, c - half), Math.min(L, c + half)]);
            }

            const maxes = windows.map(([s, e]) => maxAngleInArc(s, e));
            const mean = maxes.reduce((s, v) => s + v, 0) / maxes.length;
            return Math.min(1, mean / Math.PI);
        }

        // ── Color matching ─────────────────────────────────────────────
        // Convert hex like "#ff3366" to a hue in [0, 360).
        function hexToHue(hex) {
            const m = hex.replace('#', '');
            const r = parseInt(m.substring(0, 2), 16) / 255;
            const g = parseInt(m.substring(2, 4), 16) / 255;
            const b = parseInt(m.substring(4, 6), 16) / 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            const d = max - min;
            if (d === 0) return 0;
            let h;
            if (max === r) h = ((g - b) / d) % 6;
            else if (max === g) h = (b - r) / d + 2;
            else h = (r - g) / d + 4;
            h *= 60;
            if (h < 0) h += 360;
            return h;
        }

        // Compute the circular mean of an array of hues (in degrees, [0, 360)).
        // Standard approach: convert each hue to a unit vector (cos, sin),
        // average the vectors, then atan2 back to an angle. Handles
        // wrap-around correctly (e.g. mean of 350° and 10° is 0°, not 180°).
        function circularMean(hues) {
            if (!hues.length) return 0;
            let sx = 0, sy = 0;
            for (const h of hues) {
                const r = h * Math.PI / 180;
                sx += Math.cos(r);
                sy += Math.sin(r);
            }
            sx /= hues.length;
            sy /= hues.length;
            let deg = Math.atan2(sy, sx) * 180 / Math.PI;
            if (deg < 0) deg += 360;
            return deg;
        }

        // Distance between the user's mean hue and the article's mean hue,
        // normalized to [0, 1] (max possible circular distance is 180°).
        function colorDistance(userHues, articleHexes) {
            if (!userHues.length || !articleHexes || !articleHexes.length) return 0;
            const articleHues = articleHexes.map(hexToHue);
            const Hd = circularMean(userHues);
            const Ha = circularMean(articleHues);
            return hueDistanceCircular(Hd, Ha) / 180;
        }

        // Bucket a hue into a name for readable copy.
        function hueName(h) {
            const buckets = [
                { name: 'red',     center:   0 },
                { name: 'orange',  center:  30 },
                { name: 'yellow',  center:  55 },
                { name: 'green',   center: 120 },
                { name: 'cyan',    center: 180 },
                { name: 'blue',    center: 220 },
                { name: 'purple',  center: 280 },
                { name: 'magenta', center: 320 },
                { name: 'red',     center: 360 }, // wrap
            ];
            let best = buckets[0], minD = 360;
            for (const b of buckets) {
                const d = Math.abs(h - b.center);
                if (d < minD) { minD = d; best = b; }
            }
            return best.name;
        }

        function joinNames(names) {
            const uniq = [...new Set(names)];
            if (uniq.length === 1) return uniq[0];
            if (uniq.length === 2) return uniq[0] + ' and ' + uniq[1];
            return uniq.slice(0, -1).join(', ') + ', and ' + uniq[uniq.length - 1];
        }

        // ── Recommendation ─────────────────────────────────────────────
        function analyzeDrawing() {
            if (typeof articles === 'undefined' || !articles.length) return;

            const sharpness = analyzeSharpness(points);
            const userHasColor = selectedHues.length > 0;

            // WEIGHT THE SCORE
            const wSharp = 0.6;
            const wColor = 0.4;

            function dist(dS, dC) {
            return Math.sqrt(
                wSharp * dS * dS +
                wColor * dC * dC
            );
            }

            const best = articles.reduce((prev, curr) => {
            const dSharpPrev = (prev.sharpness ?? 0.5) - sharpness;
            const dSharpCurr = (curr.sharpness ?? 0.5) - sharpness;

            const dColorPrev = userHasColor ? colorDistance(selectedHues, prev.colors) : 0;
            const dColorCurr = userHasColor ? colorDistance(selectedHues, curr.colors) : 0;

            return dist(dSharpCurr, dColorCurr) < dist(dSharpPrev, dColorPrev)
                ? curr
                : prev;
            });

            const sharpType = sharpness > 0.5 ? "sharp angles" : "smooth curves";
            const sharpStyle = sharpness > 0.5 ? "analytical, conceptual thinking" : "narrative, flowing ideas";

            document.getElementById('recText').innerHTML =
                `Your ${sharpType} suggest a preference for ${sharpStyle}. <strong>Recommended for you:</strong><br>` +
                `<a href="${articlePath(best)}" style="color:inherit;text-decoration:underline;">"${best.title}"</a> — ${best.recommendationDesc || ''}`;
            document.getElementById('articleRec').classList.add('visible');
        }

        // ── Drawing event handlers ─────────────────────────────────────
        function startDraw(x, y) {
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
            drawGrid();
            document.getElementById('articleRec').classList.remove('visible');
            drawCanvas.closest('.draw-section').classList.add('drawing');
            isDrawing = true;
            drawingProgress = 0;
            lastPoint = getCanvasPoint(x, y);
            points = [lastPoint];
        }

        function moveDraw(x, y) {
            if (!isDrawing) return;
            const p = getCanvasPoint(x, y);
            drawingProgress += 0.02;
            drawCtx.strokeStyle = getStrokeColor(drawingProgress);
            drawCtx.lineWidth = 3;
            drawCtx.lineCap = 'round';
            drawCtx.beginPath();
            drawCtx.moveTo(lastPoint.x, lastPoint.y);
            drawCtx.lineTo(p.x, p.y);
            drawCtx.stroke();
            points.push(p);
            lastPoint = p;
        }

        function endDraw() {
            if (isDrawing && points.length > 5) analyzeDrawing();
            isDrawing = false;
            drawCanvas.closest('.draw-section').classList.remove('drawing');
        }

        drawCanvas.addEventListener('mousedown', e => startDraw(e.clientX, e.clientY));
        drawCanvas.addEventListener('mousemove', e => moveDraw(e.clientX, e.clientY));
        drawCanvas.addEventListener('mouseup', endDraw);
        drawCanvas.addEventListener('touchstart', e => {
            e.preventDefault();
            startDraw(e.touches[0].clientX, e.touches[0].clientY);
        });
        drawCanvas.addEventListener('touchmove', e => {
            e.preventDefault();
            moveDraw(e.touches[0].clientX, e.touches[0].clientY);
        });
        drawCanvas.addEventListener('touchend', endDraw);

        // ═══════════════════════════════════════════════════════════════
        // TOOLBAR (unchanged structure, updated algorithm formula)
        // ═══════════════════════════════════════════════════════════════
        function buildToolbar() {
            const bar = document.getElementById('toolbarBar');
            if (!bar) return;

            const articlesHtml = () => {
                if (typeof articles === 'undefined' || !articles.length)
                    return '<p style="opacity:0.4;font-size:0.85rem;">No articles loaded.</p>';
                return articles.map(a => `
                <a href="${articlePath(a)}" class="article-item">
                    <h4>${a.title}
                        <span style="font-weight:400;opacity:0.45;font-size:0.72rem;">
                            ${a.publishDate || ''} · ${a.readTime || ''}
                        </span>
                    </h4>
                    <p>${a.description || ''}</p>
                </a>`).join('');
            };

            const tiles = [
                {
                    num: '01', name: 'Essays',
                    scrollable: true,
                    content: () => articlesHtml()
                },
                {
                    num: '02', name: 'Playlist',
                    content: () => `<div style="max-width:360px;"><iframe style="border-radius:0;width:100%;height:152px;display:block;border:none;"
                    src="https://open.spotify.com/embed/playlist/1UQ7pG01imfZRid6JVeEhS?utm_source=generator"
                    frameBorder="0" allowfullscreen
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
                    loading="lazy"></iframe></div>`
                },
                {
                    num: '03', name: 'Algorithm',
                    content: () => `
                    <p style="font-size:0.95rem; text-align:center;">
                    \\[ \\underset{a \\in \\{\\text{articles}\\}}{\\operatorname{argmin}} \\sqrt{(S_d - S_a)^2 + d_{\\text{hue}}(H_d, H_a)^2} \\]
                    </p>
                    <p style="font-size:0.8rem;opacity:0.6;margin-top:0.5rem;">
                    Where S is smoothness, and H is the circular mean of the
                    hues — for the drawing (H<sub>d</sub>) and for the
                    article (H<sub>a</sub>). Our recommendation logic in action.
                    </p>`
                },
                {
                    num: '04', name: 'Citation',
                    content: () => `<p id="randomCitation"
                    style="font-style:italic;font-size:1rem;line-height:1.6;opacity:0.85;">
                    "Language is a virus from outer space." — William S. Burroughs
                    </p>`
                },
                {
                    num: '05', name: 'Methodology',
                    content: () => `<p style="font-size:0.88rem;line-height:1.6;opacity:0.7;">
                    Our research combines archival depth with computational methods.
                    Every claim is traceable. Every image is contextualized.
                    </p>`
                },
                {
                    num: '06', name: 'Our Desk',
                    content: () => `
                    <div class="map-panel-wrap">
                        <iframe src="map/map.html?embed" loading="lazy" tabindex="-1"></iframe>
                        <div class="map-panel-overlay" onclick="window.location.href='map/map.html'">
                            <span>Open our desk →</span>
                        </div>
                    </div>`
                },
            ];

            bar.innerHTML = tiles.map((t, i) => `
            <div class="tool-tile" id="tile-${i}"
                 onmouseenter="clearTimeout(window._tileTimer)"
                 onmouseleave="window._tileTimer = setTimeout(() => {
                     document.querySelectorAll('.tool-tile.pinned').forEach(t=>t.classList.remove('pinned'));
                 }, 250)">
                <div class="tool-panel ${t.scrollable ? 'scrollable' : ''}"
                     onmouseenter="clearTimeout(window._tileTimer)"
                     onmouseleave="window._tileTimer = setTimeout(() => {
                         document.querySelectorAll('.tool-tile.pinned').forEach(t=>t.classList.remove('pinned'));
                     }, 250)">
                    <div class="tool-panel-inner" data-label="${t.name}">${t.content()}</div>
                </div>
                <div class="tool-tile-label">
                    <span class="tool-tile-num">${t.num}</span>
                    <span class="tool-tile-name">${t.name}</span>
                </div>
            </div>`).join('');

            const cit = document.getElementById('randomCitation');
            if (cit && typeof getRandomCitation === 'function')
                cit.textContent = getRandomCitation();

            if (window.MathJax) MathJax.typesetPromise();
        }

        function getRandomCitation() {
            let all = [];
            if (typeof articles !== 'undefined') {
                articles.forEach(a => { if (a.citations) all = all.concat(a.citations); });
            }
            if (!all.length) return '"Language is a virus from outer space." — William S. Burroughs';
            const [author, quote] = all[Math.floor(Math.random() * all.length)].split('/');
            return `"${quote}" — ${author}`;
        }

        // ── Boot ───────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            buildToolbar();
        });

        initProgressBar();
        if (isDesktop) {
            initKeyboardShortcuts({
                extraKeys: {
                    'a': openNextArticle,
                    'A': openNextArticle,
                    'Escape': returnToHome,
                    'h': returnToHome,
                    'H': returnToHome,
                }
            });
        }
    </script>
