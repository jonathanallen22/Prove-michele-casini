.archive-grid.is-switching .article-entry {

        .archive-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 6rem 2rem 0rem;
        }

        .research-mode-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;

        .archive-title {

            letter-spacing: -0.03em;

        .archive-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 3rem;

            font-size: 0.75rem;

            color: inherit;

            font-family: inherit;
            font-size: inherit;
            letter-spacing: inherit;
            text-transform: inherit;

        .filter-button:hover,

            opacity: 1;
            background: var(--dynamic-color);
            color: var(--white);
            border-color: var(--dynamic-color);
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(var(--cols, 4), 1fr);
            grid-auto-rows: 120px;
            gap: 0.75rem;
            margin: 2rem 0;
        }
@keyframes cardIn {
    from { opacity: 0; transform: translateY(28px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}
        .article-entry {
            grid-column: span var(--w, 1);
            grid-row: span var(--h, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            border-radius: 2px;
            background: #fff;

            border: 1px solid rgba(0, 0, 0, 0.2);

    <script>
        let currentFilter = { view: 'timeline' };

        // Initialize Archive
        function initializeArchive() {
            if (typeof articles === 'undefined') {
                console.warn('Articles data not loaded');
                return;
            }
            calculateStatistics();
            renderArticles();
        }
        window.addEventListener('load', () => {
            initializeArchive();
        });

        function calculateStatistics() {
            animateCounter('totalArticles', articles.length);
            animateCounter('totalHours', 0);
        }

        function animateCounter(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const duration = 1000;
            const startTime = performance.now();

            function updateCounter(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = 1 - Math.pow(1 - progress, 3);
                element.textContent = Math.floor(targetValue * easedProgress);
                if (progress < 1) requestAnimationFrame(updateCounter);
            }

            requestAnimationFrame(updateCounter);
        }

        function setViewMode(mode) {
    currentFilter.view = mode;
    document.querySelectorAll('[data-view]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === mode);
    });
    const grid = document.getElementById('archiveGrid');
    grid.classList.add('is-switching');
    setTimeout(() => {
        renderArticles();
        grid.classList.remove('is-switching');
    }, 200);
}

        function parseDate(dateString) {
            if (dateString === 'random') return new Date(2024, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28));
            const months = {
                'january': 0, 'february': 1, 'march': 2, 'april': 3,
                'may': 4, 'june': 5, 'july': 6, 'august': 7,
                'september': 8, 'october': 9, 'november': 10, 'december': 11
            };
            const parts = dateString.toLowerCase().split(' ');
            return new Date(parseInt(parts[1]) || 2025, months[parts[0]] || 0, 1);
        }

        function getFilteredAndSortedArticles() {
            return [...articles].sort((a, b) => {
                if (currentFilter.view === 'timeline')
                    return parseDate(b.publishDate) - parseDate(a.publishDate);
                return a.author.localeCompare(b.author);
            });
        }

        function formatCitations(citations) {
            if (!citations || citations.length === 0) return '';
            return citations.map(c => {
                const [author, quote] = c.split('/');
                return `"${quote}" - ${author}`;
            }).join('<br>');
        }
        
        // RENDER BLOCKS
        function getColumnCount() {
            const w = window.innerWidth;
            if (w >= 1100) return 4;
            if (w >= 800) return 3;
            return 2;
        }

        // Pick a contrasting text color (black or white) based on bg luminance
        function textColorFor(hex) {
            const h = hex.replace('#', '');
            const r = parseInt(h.substr(0, 2), 16);
            const g = parseInt(h.substr(2, 2), 16);
            const b = parseInt(h.substr(4, 2), 16);
            const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return lum > 0.6 ? '#111' : '#fff';
        }

function assignBlockDimensions(articleList, cols) {
    // Curated size templates — anarchic but nothing grotesquely large
    // Each entry is [colSpan, rowSpan]. Max w:2 keeps things classy.
    const templates = [
        [1,1], [2,1], [1,2], [1,1],
        [1,1], [1,2], [2,1], [1,1],
        [2,2], [1,1], [1,1], [2,1],
        [1,2], [1,1], [2,1], [1,1],
    ];

    const dims = [];
    let colTracker = Array(cols).fill(0);
    let templateIdx = 0;

    for (let i = 0; i < articleList.length; i++) {
        const articlesLeft = articleList.length - i;

        // Find leftmost shallowest column
        const minFilled = Math.min(...colTracker);
        let startCol = colTracker.indexOf(minFilled);

        // How many contiguous free cols from startCol?
        let freeRun = 0;
        for (let c = startCol; c < cols; c++) {
            if (colTracker[c] === minFilled) freeRun++;
            else break;
        }

        // Pick next template, clamp w to what's actually free (max 2)
        let [tw, th] = templates[templateIdx % templates.length];
        templateIdx++;
        let w = Math.min(tw, freeRun, 2);
        if (articlesLeft === 1) w = Math.min(freeRun, 2);
        w = Math.max(1, w);
        let h = (w === 1) ? th : th; // keep h from template

        dims.push({ w, h });

        for (let c = 0; c < w; c++) {
            colTracker[startCol + c] = minFilled + h;
        }
    }
    return dims;
}

        function renderArticles() {
            const archiveGrid = document.getElementById('archiveGrid');
            const cols = getColumnCount();
            archiveGrid.style.setProperty('--cols', cols);

            const sorted = getFilteredAndSortedArticles();
            const dims = assignBlockDimensions(sorted, cols);
            archiveGrid.innerHTML = sorted.map((article, i) => {
    const { w, h } = dims[i];
                const colors = (article.colors && article.colors.length) ? article.colors : ['#888'];
                const stripe = `<div class="color-stripe">${colors.map(c => `<span style="background:${c}"></span>`).join('')}</div>`;
                return `
                    <a class="article-entry"
                    href="/articles/${article.folder}/${article.filename}"
                    data-article-id="${article.id}"
                    style="--w: ${w}; --h: ${h}; --i: ${i}">
                        <div class="block-hint">↗</div>
                        <div class="block-content">
                            <h2 class="block-title">${article.title}</h2>
                            <div class="block-meta">
                                <span class="block-author">${article.author}</span>
                                <span class="block-readtime">${article.publishDate ? article.publishDate : ''}${article.readTime ? ' · ' + article.readTime : ''}</span>
                            </div>
                        </div>
                        <div class="block-description">${article.description || article.recommendationDesc || ''}</div>
                        ${stripe}
                    </a>
                `;
            }).join('');
            archiveGrid.querySelectorAll('.article-entry').forEach(attachTilt);
        }

        function attachTilt(el) {
            el.addEventListener('mousemove', e => {
                const r = el.getBoundingClientRect();
                const x = (e.clientX - r.left) / r.width  - 0.5;
                const y = (e.clientY - r.top)  / r.height - 0.5;
                el.style.transition = 'transform 0.05s linear, box-shadow 0.4s var(--ease)';
                el.style.transform = `perspective(600px) rotateY(${x * 10}deg) rotateX(${-y * 10}deg) translateZ(8px)`;
                el.style.boxShadow = `${-x * 20}px ${-y * 20}px 40px rgba(0,0,0,0.2)`;
            });
            el.addEventListener('mouseleave', () => {
                el.style.transition = 'transform 0.5s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.5s var(--ease)';
                el.style.transform = '';
                el.style.boxShadow = '';
            });
        }

        // Hide ↗ hints once user has scrolled (they've got it)
        window.addEventListener('scroll', () => {
            document.body.classList.add('has-scrolled');
        }, { passive: true, once: true });

        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderArticles, 200);
        });

        initProgressBar();

        // Research Mode — module in archive/research-mode.js
        ResearchMode.init({ onArticleSelected: highlightAndScrollToArticle });

        function highlightAndScrollToArticle(targetArticle) {
            document.querySelectorAll('.article-entry').forEach(e => e.classList.remove('highlighted'));
            const el = document.querySelector(`[data-article-id="${targetArticle.id}"]`);
            if (el) {
                el.classList.add('highlighted');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => el.classList.remove('highlighted'), 3000);
            }
        }

        if (isDesktop) {
            initKeyboardShortcuts({
                extraKeys: {
                    'a': openNextArticle,
                    'A': openNextArticle,
                    'Escape': returnToHome,
                    'h': returnToHome,
                    'H': returnToHome,
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    ResearchMode.toggle();
                }
            });

            // Load Perry Lee module
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'js/perry-lee.js';
            document.body.appendChild(script); */

        }
    </script>
