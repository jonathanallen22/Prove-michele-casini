<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive - Antitesi Magazine</title>
    
    <!-- Redirect to mobile version on mobile devices -->
    <script>
        (function () {
            const isMobile = window.innerWidth < 768 &&
                /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile) {
                window.location.replace('/archive/mobile');
            }
        })();
    </script>

    <script src="js/articles-and-utils.js"></script>
    <script src="archive/research-mode.js"></script>
    <!-- Device detection: FlyingMagazine & Three.js import for desktop only -->
    <script>
        const isDesktop = window.innerWidth >= 768 && !/iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isDesktop) {
            document.write('<script type="importmap">\n{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/examples/jsm/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}\n<\/script>');
        }
        if (isDesktop) {
            document.write('<link rel="stylesheet" href="css/spark_styles.css">\n<script>window.magazineSparkMode = true;<\/script>\n<script src="js/flying-magazine.js"><\/script>');
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Fraunces:opsz,wght@9..144,700&family=Inter:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/index_style.css">
    <link rel="stylesheet" href="css/mobile.css">
    <style>
        .archive-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 6rem 2rem 0rem;
        }

        .research-mode-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            z-index: 150;
            opacity: 0;
            pointer-events: none;
            transition: all 0.6s var(--ease);
        }

        body.dark-mode .research-mode-overlay {
            background: rgba(0, 0, 0, 0.95);
        }

        .research-mode-overlay.active {
            opacity: 0.8;
            pointer-events: all;
        }

        .keyword-graph-canvas {
            width: 100%;
            height: 100%;
            cursor: pointer;
            position: absolute;
            top: 0;
            left: 0;
        }

        .archive-header {
            margin-bottom: 4rem;
            text-align: center;
        }

        .archive-title {
            font-family: var(--display);
            font-size: clamp(3rem, 8vw, 6rem);
            line-height: 0.9;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .archive-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            justify-content: center;
            margin-bottom: 4rem;
            font-family: var(--grotesk);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .control-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .control-label {
            opacity: 0.5;
            white-space: nowrap;
        }

        .filter-button {
            background: none;
            border: 1px solid currentColor;
            color: inherit;
            padding: 0.5rem 1rem;
            cursor: pointer;
            transition: all 0.3s var(--ease);
            opacity: 0.3;
            font-family: inherit;
            font-size: inherit;
            letter-spacing: inherit;
            text-transform: inherit;
        }

        .filter-button:hover,
        .filter-button.active {
            opacity: 1;
            background: var(--dynamic-color);
            color: var(--white);
            border-color: var(--dynamic-color);
        }

        .archive-grid {
            position: relative;
            display: grid;
            gap: 0rem;
            margin-top: 0rem;
        }


        .archive-grid::before {
            content: '';
            position: absolute;
            left: 2rem;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--dynamic-color);
            opacity: 0.2;
            transition: opacity 0.6s var(--ease);
        }

        .article-entry {
            padding-left: 5rem;
            position: relative;
            padding: 2rem 1rem 2rem 5rem;
        }

        .article-entry::before {
            content: '';
            position: absolute;
            left: 1.5rem;
            top: 2.5rem;
            width: 1rem;
            height: 1rem;
            border: 2px solid var(--dynamic-color);
            background: var(--white);
            border-radius: 50%;
            transition: all 0.3s var(--ease);
        }

        body.dark-mode .article-entry::before {
            background: var(--black);
        }

        .article-entry:hover::before {
            background: var(--dynamic-color);
            transform: scale(1.2);
        }

        .article-entry.highlighted {
            background: var(--gray);
            padding-right: 3rem;
            border: 2px solid var(--dynamic-color);
            border-radius: 4px;
            transform: scale(1.02);
        }

        body.dark-mode .article-entry.highlighted {
            background: #0a0a0a;
        }

        .article-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .article-title-section {
            flex: 1;
            min-width: 300px;
        }

        .article-title {
            font-family: var(--display);
            font-size: 2rem;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            letter-spacing: -0.01em;
        }

        .article-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s var(--ease);
        }

        .article-title a:hover {
            color: var(--dynamic-color);
        }

        .article-author {
            font-family: var(--grotesk);
            font-size: 0.875rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .article-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.5rem;
            font-family: var(--grotesk);
            font-size: 0.75rem;
            text-align: right;
        }

        .meta-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .meta-item--date {
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .meta-item--readtime {
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            white-space: nowrap;
        }

        .article-description {
            font-size: 1.125rem;
            line-height: 1.6;
            padding: 0.2rem;
            margin-bottom: 1.5rem;
            font-style: italic;
            opacity: 0.8;
        }

        .article-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .keyword-tag {
            padding: 0.25rem 0.75rem;
            border: 1px solid currentColor;
            opacity: 0.3;
            font-family: var(--grotesk);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s var(--ease);
            background: none;
            color: inherit;
            display: inline-block;
            cursor: pointer;
        }

        .keyword-tag:hover {
            opacity: 1;
            background: var(--dynamic-color);
            color: var(--white);
            border-color: var(--dynamic-color);
        }

        .article-citations {
            font-family: var(--grotesk);
            font-size: 0.875rem;
            opacity: 0.6;
            font-style: italic;
            margin-top: 1rem;
            margin-bottom: 1rem;
            border-left: 2px solid var(--dynamic-color);
            padding-left: 1rem;
            transition: border-color 0.6s var(--ease);
        }

        .citations-label {
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.7rem;
            font-style: normal;
            opacity: 0.4;
            margin-bottom: 0.5rem;
        }

        .archive-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0rem;
            margin: 4rem 0;
            padding: 2rem 0;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        body.dark-mode .archive-stats {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-family: var(--display);
            font-size: 3rem;
            line-height: 1;
            color: var(--dynamic-color);
            transition: color 0.6s var(--ease);
        }

        .stat-label {
            font-family: var(--grotesk);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.5;
            margin-top: 0.5rem;
        }

        .keyword-selection-panel {
            position: fixed;
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid var(--dynamic-color);
            border-radius: 4px;
            padding: 1rem;
            min-width: 200px;
            max-width: 300px;
            z-index: 200;
            font-family: var(--grotesk);
            font-size: 0.85rem;
            backdrop-filter: blur(8px);
        }

        body.dark-mode .keyword-selection-panel {
            background: rgba(0, 0, 0, 0.92);
            color: var(--white);
        }

        .panel-header {
            font-weight: 600;
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.75rem;
            opacity: 0.8;
        }

        .panel-article {
            padding: 0.5rem 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.2s var(--ease);
        }

        body.dark-mode .panel-article {
            border-color: rgba(255, 255, 255, 0.1);
        }

        .panel-article:last-child {
            border-bottom: none;
        }

        .panel-article:hover {
            background: var(--dynamic-color);
            color: var(--white);
            padding-left: 0.5rem;
        }

        .panel-close {
            position: absolute;
            top: 0.5rem;
            right: 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            line-height: 1;
        }

        .panel-close:hover {
            opacity: 1;
        }

    </style>
</head>

<body>
    <script>
        if (localStorage.getItem('darkMode') === 'true')
            document.body.classList.add('dark-mode');
    </script>
    <div class="progress-bar"></div>

    <!-- Navigation -->
    <nav class="nav-cluster">
        <a href="index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="about.html">About</a>
    </nav>

    <!-- Research Mode Overlay -->
    <div class="research-mode-overlay" id="researchModeOverlay">
        <canvas class="keyword-graph-canvas" id="keywordGraphCanvas"></canvas>
    </div>

    <!-- Archive Container -->
    <div class="archive-container">

        <header class="archive-header">
            <h1 class="archive-title">Archive</h1>
        </header>

        <div class="archive-controls">
            <div class="control-section">
                <span class="control-label">View:</span>
                <button class="filter-button active" data-view="timeline" onclick="setViewMode('timeline')">By
                    Time</button>
                <button class="filter-button" data-view="list" onclick="setViewMode('list')">By Author</button>
            </div>
        </div>

        <main class="archive-grid" id="archiveGrid"></main>

        <div class="archive-stats" id="archiveStats">
            <div class="stat-item">
                <div class="stat-number" id="totalArticles">0</div>
                <div class="stat-label">Articles</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="totalHours">0</div>
                <div class="stat-label">Hours online</div>
            </div>
        </div>
    </div>

    <!-- Keyboard Shortcuts Hint -->
    <div class="shortcuts-hint"></div>

    <script>
        let currentFilter = { view: 'timeline' };

        // Initialize Archive
        function initializeArchive() {
            if (typeof articles === 'undefined') {
                console.warn('Articles data not loaded');
                return;
            }
            calculateStatistics();
            renderArticles();
        }
        window.addEventListener('load', () => {
            initializeArchive();
        });

        function calculateStatistics() {
            animateCounter('totalArticles', articles.length);
            animateCounter('totalHours', 0);
        }

        function animateCounter(elementId, targetValue) {
            const element = document.getElementById(elementId);
            const duration = 1000;
            const startTime = performance.now();

            function updateCounter(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easedProgress = 1 - Math.pow(1 - progress, 3);
                element.textContent = Math.floor(targetValue * easedProgress);
                if (progress < 1) requestAnimationFrame(updateCounter);
            }

            requestAnimationFrame(updateCounter);
        }

        function setViewMode(mode) {
            currentFilter.view = mode;
            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.view === mode);
            });
            renderArticles();
        }

        function parseDate(dateString) {
            if (dateString === 'random') return new Date(2024, Math.floor(Math.random() * 12), Math.floor(Math.random() * 28));
            const months = {
                'january': 0, 'february': 1, 'march': 2, 'april': 3,
                'may': 4, 'june': 5, 'july': 6, 'august': 7,
                'september': 8, 'october': 9, 'november': 10, 'december': 11
            };
            const parts = dateString.toLowerCase().split(' ');
            return new Date(parseInt(parts[1]) || 2025, months[parts[0]] || 0, 1);
        }

        function getFilteredAndSortedArticles() {
            return [...articles].sort((a, b) => {
                if (currentFilter.view === 'timeline')
                    return parseDate(b.publishDate) - parseDate(a.publishDate);
                return a.author.localeCompare(b.author);
            });
        }

        function formatCitations(citations) {
            if (!citations || citations.length === 0) return '';
            return citations.map(c => {
                const [author, quote] = c.split('/');
                return `"${quote}" - ${author}`;
            }).join('<br>');
        }

        function renderArticles() {
            const archiveGrid = document.getElementById('archiveGrid');
            archiveGrid.innerHTML = getFilteredAndSortedArticles().map(article => `
                <article class="article-entry" data-article-id="${article.id}">
                    <header class="article-header">
                        <div class="article-title-section">
                            <h2 class="article-title">
                                <a href="/articles/${article.folder}/${article.filename}">${article.title}</a>
                            </h2>
                            <div class="article-author">${article.author}</div>
                        </div>
                        <div class="article-meta">
                            <div class="meta-row">
                                <span class="meta-item--date">${article.publishDate}</span>
                                <span class="meta-item--readtime">${article.readTime}</span>
                            </div>
                        </div>
                    </header>
                    <p class="article-description">${article.description}</p>
                    <div class="article-keywords">
                        ${article.keywords.map(k => `<span class="keyword-tag">${k}</span>`).join('')}
                    </div>
                    ${article.citations && article.citations.length > 0 ? `
                        <div class="article-citations">
                            <div class="citations-label">Citations</div>
                            ${formatCitations(article.citations)}
                        </div>
                    ` : ''}
                </article>
            `).join('');
        }

        initProgressBar();

        // Research Mode — module in archive/research-mode.js
        ResearchMode.init({ onArticleSelected: highlightAndScrollToArticle });

        function highlightAndScrollToArticle(targetArticle) {
            document.querySelectorAll('.article-entry').forEach(e => e.classList.remove('highlighted'));
            const el = document.querySelector(`[data-article-id="${targetArticle.id}"]`);
            if (el) {
                el.classList.add('highlighted');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => el.classList.remove('highlighted'), 3000);
            }
        }

        if (isDesktop) {
            initKeyboardShortcuts({
                extraKeys: {
                    'a': openNextArticle,
                    'A': openNextArticle,
                    'Escape': returnToHome,
                    'h': returnToHome,
                    'H': returnToHome,
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'r' || e.key === 'R') {
                    ResearchMode.toggle();
                }
            });

            window.perryTortureMessages = [
                "Your turn, perhaps?",
                "We do publish things here, you know.",
            ];

            // Create Perry Lee viewer div
            const viewer = document.createElement('div');
            viewer.id = 'viewer';
            document.body.appendChild(viewer);

            // Load Perry Lee module
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'js/perry-lee.js';
            document.body.appendChild(script);
        }
    </script>
</body>

</html>
