mF8osavn9Ewxi7RUV8norlDMRbmrxFixuo38MSNhxLk//9k=";

        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H, dots = [], animId, t = 0, state = 'scattered';

        function ease(p) { return p < 0.5 ? 2 * p * p : -1 + (4 - 2 * p) * p }

        const CROP = { top: 0.135, bottom: 0.843, left: 0.133, right: 0.770 };

        // Where the tower lands: scale + position within viewport
        // Tower occupies ~35% of viewport width, placed center-right
        const TOWER_SCALE = 0.2;
        const TOWER_OFFSET_X = 0.865; // horizontal center of tower (0=left,1=right)
        const TOWER_OFFSET_Y = 0.50; // vertical center of tower

        const img = new Image();
        img.onload = setup;
        img.src = IMG_B64;

        function setup() {
            W = window.innerWidth;
            H = window.innerHeight;
            canvas.width = W;
            canvas.height = H;

            // Sample the image at a working resolution
            const cropW_frac = CROP.right - CROP.left;
            const cropH_frac = CROP.bottom - CROP.top;
            const cropAspect = (img.naturalHeight * cropH_frac) / (img.naturalWidth * cropW_frac);

            // Reference size for sampling (doesn't need to be huge)
            const refW = Math.min(640, W);
            const refH = Math.round(refW * cropAspect);

            const srcX = img.naturalWidth * CROP.left;
            const srcY = img.naturalHeight * CROP.top;
            const srcW = img.naturalWidth * cropW_frac;
            const srcH = img.naturalHeight * cropH_frac;

            const ofc = document.createElement("canvas");
            ofc.width = refW; ofc.height = refH;
            const octx = ofc.getContext("2d");
            octx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, refW, refH);
            const px = octx.getImageData(0, 0, refW, refH).data;

            // Compute tower destination rect in viewport coords
            const towerW = W * TOWER_SCALE;
            const towerH = towerW * cropAspect;
            const towerLeft = W * TOWER_OFFSET_X - towerW / 2;
            const towerTop = H * TOWER_OFFSET_Y - towerH / 2;

            dots = [];
            const STEP = 9;
            for (let y = STEP / 2; y < refH; y += STEP) {
                for (let x = STEP / 2; x < refW; x += STEP) {
                    const i = (Math.round(y) * refW + Math.round(x)) * 4;
                    const r = px[i], g = px[i + 1], b = px[i + 2];
                    const br = (r + g + b) / 3;
                    const sat = Math.max(r, g, b) - Math.min(r, g, b);
                    if (br > 215 && sat < 30) continue;

                    let rs = 0, gs = 0, bs = 0, n = 0;
                    for (let dy = -2; dy <= 2; dy++)for (let dx = -2; dx <= 2; dx++) {
                        const ni = ((Math.round(y) + dy) * refW + (Math.round(x) + dx)) * 4;
                        if (ni >= 0 && ni < px.length) { rs += px[ni]; gs += px[ni + 1]; bs += px[ni + 2]; n++; }
                    }
                    const color = "rgb(" + Math.round(rs / n) + "," + Math.round(gs / n) + "," + Math.round(bs / n) + ")";
                    const baseR = 2.2 + Math.random() * 3.0;

                    // Target position: map from sample coords to tower rect in viewport
                    const tx = towerLeft + (x / refW) * towerW;
                    const ty = towerTop + (y / refH) * towerH;
                    const eiffel_margin = 0.25

                    dots.push({
                        // Start scattered across full viewport
                        x: (Math.random() < 0.5) ? Math.random() * W * eiffel_margin : Math.random() * W * eiffel_margin / 1.2,
                        y: Math.random() * H,
                        // Tower target
                        tx, ty,
                        // Scattered target (for re-scatter)
                        ex: (Math.random() < 0.5) ? Math.random() * W * eiffel_margin : Math.random() * W * eiffel_margin / 1.2,
                        ey: Math.random() * H,
                        baseR,
                        r: baseR * 0.5,
                        color,
                        phase: Math.random() * Math.PI * 2,
                        breathPhase: Math.random() * Math.PI * 2,
                        breathSpeed: 0.012 + Math.random() * 0.018,
                        breathAmp: 0.35 + Math.random() * 0.45,
                        moveSpeed: 0.003 + Math.random() * 0.005,
                        moveAmp: 0.6 + Math.random() * 1.5,
                        movePhasX: Math.random() * Math.PI * 2,
                        movePhasY: Math.random() * Math.PI * 2,
                    });
                }
            }

            state = "scattered";
            // Initial scattered idle drift
            scatterFloat();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);
            for (const d of dots) {
                ctx.beginPath();
                ctx.arc(d.x, d.y, Math.max(0.5, d.r), 0, Math.PI * 2);
                ctx.fillStyle = d.color;
                ctx.globalAlpha = 0.86;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // Idle float when scattered — dots drift gently
        function scatterFloat() {
            cancelAnimationFrame(animId);
            function loop() {
                t++;
                for (const d of dots) {
                    d.r = d.baseR * 0.5 * (1 + Math.sin(d.breathPhase + t * d.breathSpeed) * d.breathAmp * 0.28);
                    d.x = d.ex + Math.sin(d.movePhasX + t * d.moveSpeed) * d.moveAmp * 3;
                    d.y = d.ey + Math.cos(d.movePhasY + t * d.moveSpeed * 0.75) * d.moveAmp * 3;
                }
                draw();
                animId = requestAnimationFrame(loop);
            }
            animId = requestAnimationFrame(loop);
        }

        // Idle float when formed — dots breathe in place
        function formedFloat() {
            cancelAnimationFrame(animId);
            t = 0;
            function loop() {
                t++;
                for (const d of dots) {
                    d.r = d.baseR * (1 + Math.sin(d.breathPhase + t * d.breathSpeed) * d.breathAmp * 0.28);
                    d.x = d.tx + Math.sin(d.movePhasX + t * d.moveSpeed) * d.moveAmp;
                    d.y = d.ty + Math.cos(d.movePhasY + t * d.moveSpeed * 0.75) * d.moveAmp;
                }
                draw();
                animId = requestAnimationFrame(loop);
            }
            animId = requestAnimationFrame(loop);
        }

        function runAnim(gx, gy, gr, dur, done) {
            cancelAnimationFrame(animId);
            for (const d of dots) {
                d._fx = d.x; d._fy = d.y; d._fr = d.r;
                d._tx = gx(d); d._ty = gy(d); d._tr = gr(d);
            }
            let s = null;
            function step(ts) {
                if (!s) s = ts;
                const p = Math.min((ts - s) / dur, 1), ep = ease(p);
                for (const d of dots) {
                    d.x = d._fx + (d._tx - d._fx) * ep;
                    d.y = d._fy + (d._ty - d._fy) * ep;
                    d.r = d._fr + (d._tr - d._fr) * ep;
                }
                draw();
                if (p < 1) animId = requestAnimationFrame(step); else done();
            }
            animId = requestAnimationFrame(step);
        }

        function compose() {
            state = "busy";
            runAnim(
                d => d.tx, d => d.ty, d => d.baseR,
                2200,
                () => { state = "formed"; formedFloat(); }
            );
        }

        function scatter() {
            state = "busy";
            // New random scatter targets
            for (const d of dots) {
                d.ex = Math.random() * W;
                d.ey = Math.random() * H;
            }
            runAnim(
                d => d.ex, d => d.ey, d => d.baseR * 0.5,
                1500,
                () => { state = "scattered"; scatterFloat(); }
            );
        }

        function onScroll() {
            if (window.scrollY > 1500 && state === "scattered") {
                compose();
                window.removeEventListener("scroll", onScroll);
            }
        }
        window.addEventListener("scroll", onScroll);
        window.addEventListener('message', (e) => {
            if (e.data === 'compose' && state === 'scattered') compose();
        });

        window.addEventListener("resize", () => {
            if (!img.complete) return;
            cancelAnimationFrame(animId);
            const prevState = state;
            setup();
            if (prevState === "formed") {
                state = "formed";
                for (const d of dots) { d.x = d.tx; d.y = d.ty; d.r = d.baseR; }
                formedFloat();
            }
        });
    </script>
